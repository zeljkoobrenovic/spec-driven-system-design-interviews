<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System Design Interviews</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 style="font-size: 60px; margin-bottom: 0">System Design Interviews</h1>
        <p class="muted" style="font-size: 20px; margin-top: 0">Pick an interview to explore step by step. Fork the source code on <a target="_blank" href="https://github.com/zeljkoobrenovic/spec-driven-system-design-interviews">GitHub</a>.</p>
      </div>
    </header>

    <main class="overview" id="overview">
      <div class="overview-search" id="overview-search" hidden>
        <input
          type="search"
          id="overview-search-input"
          class="overview-search-input"
          placeholder="Search interviews…"
          autocomplete="off"
          aria-label="Search interviews"
        />
        <p id="overview-search-empty" class="muted" hidden>No interviews match your search.</p>
      </div>
      <p id="overview-status" class="muted">Loading…</p>
      <div id="overview-results"></div>
    </main>

    <div id="error-banner" class="error-banner" hidden></div>

    <script src="overview.js"></script>
  </body>
</html>
