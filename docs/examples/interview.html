<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>System Design Step-by-Step Explorer</title>
    <link rel="stylesheet" href="styles.css"/>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-129891352-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'UA-129891352-1');
    </script>
</head>
<body>
<header class="topbar">
    <div>
        <div><a href="index.html" class="overview-link" aria-label="Back to overview">← All interviews</a></div>
        <div class="topbar-left"><img id="dataset-icon" class="dataset-icon" alt="" hidden/>
            <h1 id="dataset-title" style="font-size: 220%">System Design Explorer</h1></div>
    </div>
</header>

<main class="layout">
    <aside class="sidebar" aria-label="Sections">
        <nav id="nav-list" class="nav-list"></nav>
    </aside>

    <section id="content" class="content">
        <div class="step-header">
            <h2 id="step-title">Loading…</h2>
            <div class="step-nav">
                <button id="prev-btn" type="button" aria-label="Previous">← Prev</button>
                <span id="step-counter" class="muted"></span>
                <button id="next-btn" type="button" aria-label="Next">Next →</button>
            </div>
        </div>

        <div id="step-description" class="step-description"></div>

        <!-- Diagram block: shown only on architecture steps -->
        <div id="diagram-block" class="diagram-block">
            <!-- Heading + description above the diagram; shown only on the Final Design entry -->
            <h3 id="diagram-heading" class="diagram-heading" hidden></h3>
            <div id="diagram-description" class="diagram-description" hidden></div>
            <div id="diagram-view-tabs" class="diagram-view-tabs" role="tablist" hidden></div>
            <div id="option-tabs" class="option-tabs" role="tablist" hidden></div>
            <!-- Diagram vs AI Visual toggle; shown only when the current view has an aiVisual -->
            <div id="visual-tabs" class="visual-tabs" role="tablist" hidden style="margin-top: 20px; margin-bottom: -12px"></div>
            <!-- Two columns: interactive node/layout controls on the left, diagram on the right -->
            <div id="diagram-layout" class="diagram-layout">
                <!-- Interactive controls: toggle nodes on/off and flip TB/LR layout -->
                <div id="diagram-controls" class="diagram-controls" hidden></div>
                <div id="diagram-container" class="diagram-container" aria-live="polite">
                    <div id="diagram" class="mermaid"></div>
                    <img id="diagram-image" class="diagram-image" alt="" hidden/>
                </div>
            </div>
            <div id="diagram-legend" class="diagram-legend" hidden>
                <span class="diagram-control-label">Legend</span>
                <div class="diagram-legend-row">
                    <div class="diagram-legend-swatch" aria-hidden="true"></div>
                    <span class="diagram-legend-text"></span>
                </div>
            </div>
            <div id="option-description" class="option-description" hidden></div>
            <div id="option-proscons" class="option-proscons" hidden></div>
        </div>

        <!-- Intro section content (requirements, capacity, api, data model, follow-ups) -->
        <div id="intro-block" class="intro-block" hidden></div>

        <!-- Per-step extras: deep dives, bottlenecks, talking points, follow-ups -->
        <div id="step-extras" class="step-extras"></div>

        <div id="error-banner" class="error-banner" hidden></div>
    </section>
</main>

<!-- Mermaid via CDN. Pinned to a known major version. -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="interview.js"></script>
</body>
</html>
