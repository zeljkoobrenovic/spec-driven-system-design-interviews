# Technology terms that use the _media/tech.png fallback.
#
# A term lands here when it has no match in _media/index.yaml, is rejected
# by the provider-family rule (an AWS/GCP/Azure chip whose icon would be
# outside aws-icons//gcp-icons//azure-icons/), or its mapped file is missing.
# assign_tech_icons.py keeps this list in sync: it adds terms that fall back
# to tech.png and prunes any term that now resolves to a real icon. To give a
# term an icon, add it to _media/index.yaml (the script prunes it from here).
missing:
  - "Garage"
  - "GeoDNS (PowerDNS/CoreDNS)"
  - "Loki"
  - "MetalLB"
  - "Mimir/Thanos/Cortex"
  - "MinIO"
  - "MinIO (origin)"
  - "NATS (JetStream)"
  - "Neo4j"
  - "OpenTelemetry"
  - "OpenTofu"
  - "Orchestrator"
  - "Packer"
  - "Patroni"
  - "Percona Server"
  - "pgpool-II"
  - "ProxySQL"
  - "Pulumi"
  - "Redpanda"
  - "repmgr"
  - "ScyllaDB"
