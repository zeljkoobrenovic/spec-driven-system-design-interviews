# Technology term -> icon mapping for the "Technology Choices" section.
#
# A list of { icon, terms } entries. `icon` is a path relative to _media/.
# `terms` are matched CASE-INSENSITIVELY; assign_tech_icons.py also strips any
# parenthetical qualifier and tries progressively shorter leading prefixes, so
# "Aurora (PostgreSQL/MySQL)" and "Aurora Global Database" both match the term
# "Aurora". Add new term->icon mappings here; terms with no good icon belong in
# _media/missing.yaml (they fall back to _media/tech.png).
#
# PROVIDER RULE (enforced by the script): a chip in the AWS column may only use
# an icon under `aws-icons/`, GCP only `gcp-icons/`, Azure only `azure-icons/`.
# A mapping that points a cloud term at the wrong family is rejected and the
# chip falls back to tech.png. Self-hosted chips may use any directory
# (typically general-icons/).

# ---------------------------------------------------------------------------
# Self-hosted / open-source (general-icons)
# ---------------------------------------------------------------------------
